<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Tienda de Carteras</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .filtros {
            margin-bottom: 30px;
        }
        .filtros button {
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
        }
        .filtros button.active {
            background-color: #ff6b9d;
        }
        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .cartera {
            text-align: center;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 10px;
        }
        .cartera img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
        }
        .cartera h3 {
            margin: 10px 0 5px 0;
            font-size: 16px;
        }
        .cartera p {
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>Mis Carteras</h1>
    
    <div class="filtros" id="filtros"></div>
    
    <div class="galeria" id="galeria"></div>

    <script>
        let carteras = [];
        let categoriaSeleccionada = null;

        // Cargar el JSON
        fetch('carteras.json')
            .then(response => response.json())
            .then(datos => {
                carteras = datos;
                mostrarCarteras(carteras);
                crearFiltros();
            });

        // Mostrar las carteras
        function mostrarCarteras(lista) {
            const galeria = document.getElementById('galeria');
            galeria.innerHTML = '';

            lista.forEach(cartera => {
                const div = document.createElement('div');
                div.className = 'cartera';
                div.innerHTML = `
                    <img src="imagenes/${cartera.imagen}" alt="${cartera.nombre}">
                    <h3>${cartera.nombre}</h3>
                    <p>${cartera.categoria}</p>
                `;
                galeria.appendChild(div);
            });
        }

        // Crear botones de filtro
        function crearFiltros() {
            const categorias = [...new Set(carteras.map(c => c.categoria))];
            const filtrosDiv = document.getElementById('filtros');
            
            // Botón "Ver todas"
            const btnTodas = document.createElement('button');
            btnTodas.textContent = 'Ver todas';
            btnTodas.className = 'active';
            btnTodas.onclick = () => {
                categoriaSeleccionada = null;
                mostrarCarteras(carteras);
                actualizarBotones('Ver todas');
            };
            filtrosDiv.appendChild(btnTodas);

            // Botones por categoría
            categorias.forEach(categoria => {
                const btn = document.createElement('button');
                btn.textContent = categoria;
                btn.onclick = () => {
                    categoriaSeleccionada = categoria;
                    const filtradas = carteras.filter(c => c.categoria === categoria);
                    mostrarCarteras(filtradas);
                    actualizarBotones(categoria);
                };
                filtrosDiv.appendChild(btn);
            });
        }

        // Actualizar estilo de botones activos
        function actualizarBotones(texto) {
            const botones = document.querySelectorAll('.filtros button');
            botones.forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === texto) {
                    btn.classList.add('active');
                }
            });
        }
    </script>
</body>
</html>
